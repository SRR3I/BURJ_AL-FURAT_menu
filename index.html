<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Burj Al-Furat | Luxury Dining Experience</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent
        }
        
        :root {
            --primary: #7d6a4a;
            --primary-light: #a08d6d;
            --primary-lighter: #c4b498;
            --primary-lightest: #e8dfc8;
            --primary-dark: #5c4f35;
            --primary-darker: #3d3423;
            --luxury-dark: #12161f;
            --luxury-darker: #0a0e1a;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--luxury-darker);
            color: #fff;
            min-height: 100vh; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: relative;
        }

        /* تحسين الخلفية مع اللون الجديد */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 15% 15%, rgba(125, 106, 74, .35) 0%, transparent 40%),
                radial-gradient(circle at 85% 25%, rgba(160, 141, 109, .3) 0%, transparent 40%),
                radial-gradient(circle at 50% 70%, rgba(196, 180, 152, .25) 0%, transparent 50%);
            pointer-events: none;
            will-change: opacity;
        }

        /* جزيئات ذهبية محدثة */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(2px 2px at 20% 30%, rgba(196, 180, 152, .75), transparent),
                radial-gradient(2px 2px at 60% 70%, rgba(125, 106, 74, .65), transparent),
                radial-gradient(1px 1px at 80% 10%, rgba(160, 141, 109, .65), transparent);
            background-size: 200% 200%;
            pointer-events: none;
            opacity: 0.7;
        }

        /* Header فاخر */
        .header {
            background: linear-gradient(
                135deg, 
                rgba(18, 22, 31, 0.95) 0%, 
                rgba(125, 106, 74, .25) 50%, 
                rgba(18, 22, 31, 0.95) 100%
            );
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(196, 180, 152, .45);
            padding: 20px 25px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .6);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
        }

        /* Logo فاخر */
        .logo-container {
            width: 95px;
            height: 95px;
            position: relative;
            flex-shrink: 0;
        }

        .logo-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: linear-gradient(135deg, rgba(18, 22, 31, 0.9), rgba(125, 106, 74, .35));
            padding: 5px;
            box-shadow: 
                0 0 40px rgba(125, 106, 74, .75),
                0 0 70px rgba(160, 141, 109, .55),
                inset 0 0 30px rgba(125, 106, 74, .25);
        }

        .logo-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            position: relative;
        }

        .logo-circle::before,
        .logo-circle::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            animation: luxuryRotate 10s linear infinite;
            will-change: transform;
        }

        .logo-circle::before {
            inset: -10px;
            border: 2px solid transparent;
            border-top-color: rgba(196, 180, 152, .75);
            border-right-color: rgba(125, 106, 74, .65);
        }

        .logo-circle::after {
            inset: -18px;
            border: 1px solid transparent;
            border-bottom-color: rgba(92, 79, 53, .55);
            border-left-color: rgba(196, 180, 152, .45);
            animation-direction: reverse;
            animation-duration: 15s;
        }

        @keyframes luxuryRotate {
            100% { transform: rotate(360deg); }
        }

        /* معلومات المطعم */
        .header-info {
            flex: 1;
            text-align: center;
            margin-left: 95px;
        }
        
        html[dir="ltr"] .header-info {
            margin-left: 0;
            margin-right: 95px;
        }

        .restaurant-name {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.6em, 5vw, 2.2em);
            font-weight: 900;
            margin-bottom: 6px;
            letter-spacing: 6px;
            background: linear-gradient(
                135deg, 
                #7d6a4a 0%, 
                #a08d6d 25%, 
                #c4b498 50%, 
                #e8dfc8 75%, 
                #fff 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
            animation: luxuryShine 3s linear infinite;
            filter: drop-shadow(0 2px 10px rgba(125, 106, 74, .6));
        }

        @keyframes luxuryShine {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .subtitle {
            font-family: 'Tajawal', sans-serif;
            font-size: 0.8em;
            color: #e8dfc8;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 2px 6px rgba(0, 0, 0, .5);
        }

        .language-menu {
            position: absolute;
            top: 18px;
            left: 18px;
            z-index: 101;
        }

        .burger-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, rgba(125, 106, 74, 0.45), rgba(160, 141, 109, 0.35));
            border: 2px solid rgba(196, 180, 152, .65);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(125, 106, 74, .45);
            position: relative;
        }

        .burger-icon img {
            width: 24px;
            height: 24px;
            filter: brightness(0) saturate(100%) invert(85%) sepia(12%) saturate(643%) hue-rotate(10deg) brightness(98%) contrast(92%);
            transition: all .3s ease;
            z-index: 2;
        }

        .burger-icon:hover {
            background: linear-gradient(135deg, rgba(125, 106, 74, 0.65), rgba(160, 141, 109, 0.5));
            border-color: rgba(196, 180, 152, .9);
            transform: scale(1.1);
        }

        .language-dropdown {
            position: absolute;
            top: 58px;
            left: 0;
            background: linear-gradient(135deg, rgba(18, 22, 31, 0.95), rgba(125, 106, 74, .18));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(196, 180, 152, .55);
            border-radius: 20px;
            overflow: hidden;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px) scale(0.95);
            transition: all .3s ease;
            box-shadow: 0 12px 40px rgba(0, 0, 0, .6);
            min-width: 180px;
        }

        .language-menu.open .language-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .lang-option {
            padding: 16px 24px;
            cursor: pointer;
            transition: all .25s ease;
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 1em;
            font-weight: 600;
            color: #c4b498;
            border-bottom: 1px solid rgba(196, 180, 152, .25);
        }

        .lang-option:last-child {
            border-bottom: none;
        }

        .lang-option:hover {
            background: linear-gradient(135deg, rgba(125, 106, 74, .35), rgba(160, 141, 109, .25));
            color: #fff;
        }

        .lang-option.active {
            color: #fff;
            background: linear-gradient(135deg, rgba(125, 106, 74, .45), rgba(160, 141, 109, .35));
        }

        .lang-icon {
            font-size: 1.4em;
            min-width: 28px;
            text-align: center;
        }

        /* Menu Tabs محسّنة */
        .menu-tabs {
            display: flex;
            gap: 12px;
            padding: 18px 18px 12px;
            overflow-x: auto;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            position: sticky;
            top: 135px;
            z-index: 99;
            background: linear-gradient(135deg, rgba(18, 22, 31, 0.95), rgba(125, 106, 74, .18));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(196, 180, 152, .45);
            box-shadow: 0 8px 32px rgba(0, 0, 0, .6);
        }

        .menu-tabs::-webkit-scrollbar {
            height: 5px;
        }

        .menu-tabs::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .menu-tabs::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #7d6a4a, #c4b498);
            border-radius: 10px;
        }

        .tab-btn {
            flex-shrink: 0;
            padding: 12px 24px;
            background: linear-gradient(135deg, rgba(125, 106, 74, .25), rgba(160, 141, 109, .18));
            border: 1px solid rgba(196, 180, 152, .35);
            border-radius: 16px;
            color: #c4b498;
            font-weight: 700;
            font-size: 1em;
            cursor: pointer;
            transition: all .25s ease;
            white-space: nowrap;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .3);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, rgba(125, 106, 74, .55), rgba(160, 141, 109, .45));
            border-color: rgba(196, 180, 152, .85);
            color: #fff;
            box-shadow: 0 6px 20px rgba(125, 106, 74, .65);
            transform: translateY(-2px);
            text-shadow: 0 2px 8px rgba(125, 106, 74, .55);
        }

        .tab-btn:hover:not(.active) {
            background: linear-gradient(135deg, rgba(125, 106, 74, .35), rgba(160, 141, 109, .28));
            border-color: rgba(196, 180, 152, .65);
            color: #fff;
            transform: translateY(-1px);
        }

        .menu-container {
            padding: 15px 18px 25px;
            position: relative;
            z-index: 1;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Section محسّن */
        .section {
            background: linear-gradient(135deg, rgba(30, 35, 48, 0.85), rgba(125, 106, 74, .15));
            margin-bottom: 24px;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(196, 180, 152, .4);
            box-shadow: 0 10px 40px rgba(0, 0, 0, .4);
            transition: border-color .3s ease, box-shadow .3s ease;
        }

        .section:hover {
            border-color: rgba(196, 180, 152, .75);
            box-shadow: 0 15px 50px rgba(125, 106, 74, .45);
        }

        .section-title {
            font-size: clamp(1.15em, 3.2vw, 1.4em);
            font-weight: 800;
            background: linear-gradient(135deg, rgba(125, 106, 74, .45), rgba(92, 79, 53, .35));
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
            transition: background .2s ease;
            color: #e8dfc8;
        }

        .section-title:active {
            background: linear-gradient(135deg, rgba(125, 106, 74, .55), rgba(160, 141, 109, .45));
        }

        .section-title-text {
            display: flex;
            align-items: center;
            gap: 14px;
            text-shadow: 0 2px 6px rgba(0, 0, 0, .4);
        }

        .toggle-icon {
            transition: transform .25s ease;
            color: #e8dfc8;
        }

        .section-title.active .toggle-icon {
            transform: rotate(180deg);
        }

        /* Section Content */
        .section-content {
            overflow: hidden;
            height: 0;
            transition: height .3s ease;
        }

        .section-content.active {
            height: auto;
        }

        /* Menu Item محسّن */
        .menu-item {
            padding: 22px;
            border-bottom: 1px solid rgba(196, 180, 152, .18);
            transition: all .25s ease;
            position: relative;
            display: flex;
            gap: 18px;
            cursor: pointer;
        }

        .menu-item::before {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #7d6a4a, #a08d6d, #c4b498);
            opacity: 0;
            transition: opacity .25s;
            box-shadow: 0 0 12px rgba(125, 106, 74, .65);
        }

        .menu-item:hover::before {
            opacity: 1;
        }

        .menu-item:hover {
            background: linear-gradient(90deg, rgba(125, 106, 74, .15), rgba(160, 141, 109, .1));
            padding-right: 28px;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .item-image-wrapper {
            flex-shrink: 0;
            width: 90px;
            height: 90px;
            border-radius: 16px;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(125, 106, 74, .28), rgba(160, 141, 109, .22));
            transition: all .25s ease;
            border: 2px solid rgba(196, 180, 152, .45);
            box-shadow: 0 6px 20px rgba(0, 0, 0, .4);
        }

        .menu-item:hover .item-image-wrapper {
            transform: scale(1.05);
            border-color: rgba(196, 180, 152, .75);
            box-shadow: 0 8px 25px rgba(125, 106, 74, .55);
        }

        .item-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform .25s ease;
        }

        .menu-item:hover .item-image {
            transform: scale(1.1);
        }

        /* Placeholder للصور المفقودة */
        .item-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(
                135deg,
                rgba(125, 106, 74, 0.15),
                rgba(160, 141, 109, 0.12),
                rgba(196, 180, 152, 0.18)
            );
            position: relative;
            overflow: hidden;
        }

        .item-placeholder::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 30% 30%, rgba(125, 106, 74, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 70% 70%, rgba(196, 180, 152, 0.25) 0%, transparent 50%);
            animation: placeholderPulse 3s ease-in-out infinite;
        }

        @keyframes placeholderPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .placeholder-icon {
            font-size: 2.5em;
            margin-bottom: 6px;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 2px 8px rgba(125, 106, 74, 0.4));
            animation: placeholderFloat 2.5s ease-in-out infinite;
        }

        @keyframes placeholderFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        .placeholder-text {
            font-size: 0.75em;
            font-weight: 600;
            color: #a08d6d;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        .menu-item:hover .item-placeholder {
            background: linear-gradient(
                135deg,
                rgba(125, 106, 74, 0.22),
                rgba(160, 141, 109, 0.18),
                rgba(196, 180, 152, 0.25)
            );
        }

        .item-content {
            flex: 1;
            min-width: 0;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 12px;
        }

        .item-name {
            font-size: 1.2em;
            font-weight: 700;
            line-height: 1.5;
            color: #fff;
            text-shadow: 0 2px 6px rgba(0, 0, 0, .3);
        }

        .item-price {
            font-family: 'Playfair Display', serif;
            font-size: 1.4em;
            font-weight: 800;
            background: linear-gradient(135deg, #7d6a4a, #a08d6d, #c4b498, #e8dfc8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
            filter: drop-shadow(0 2px 6px rgba(125, 106, 74, .5));
        }

        .item-description {
            font-size: .95em;
            color: #c4b498;
            line-height: 1.7;
            text-shadow: 0 1px 3px rgba(0, 0, 0, .3);
        }

        /* Modal محسّن */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .96);
            z-index: 1000;
            opacity: 0;
            transition: opacity .3s;
            animation: modalFadeIn 0.3s ease forwards;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        @keyframes modalFadeIn {
            to { opacity: 1; }
        }

        @keyframes modalFadeOut {
            to { opacity: 0; }
        }

        .modal.active {
            display: flex;
        }

        .modal.closing {
            animation: modalFadeOut 0.3s ease forwards;
        }

        .modal-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .modal-close {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(125, 106, 74, .45), rgba(160, 141, 109, .35));
            border: 2px solid rgba(196, 180, 152, .65);
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .3s ease;
            z-index: 1002;
            box-shadow: 0 6px 20px rgba(0, 0, 0, .6);
        }

        .modal-close:hover {
            background: linear-gradient(135deg, rgba(239, 68, 68, .9), rgba(220, 38, 38, .8));
            transform: rotate(90deg) scale(1.1);
            border-color: rgba(239, 68, 68, 1);
            box-shadow: 0 8px 25px rgba(239, 68, 68, .5);
        }

        .modal-image-container {
            position: relative;
            width: 100%;
            max-width: 650px;
            height: 65vh;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            margin-bottom: 25px;
        }

        /* Modal Placeholder */
        .modal-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(
                135deg,
                rgba(125, 106, 74, 0.2),
                rgba(160, 141, 109, 0.15),
                rgba(196, 180, 152, 0.22)
            );
            border-radius: 20px;
            border: 3px solid rgba(196, 180, 152, .45);
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 70px rgba(0, 0, 0, .6);
        }

        .modal-placeholder::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 30% 30%, rgba(125, 106, 74, 0.35) 0%, transparent 60%),
                radial-gradient(circle at 70% 70%, rgba(196, 180, 152, 0.3) 0%, transparent 60%);
            animation: modalPlaceholderPulse 4s ease-in-out infinite;
        }

        @keyframes modalPlaceholderPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .modal-placeholder-icon {
            font-size: 6em;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 4px 12px rgba(125, 106, 74, 0.5));
            animation: modalPlaceholderFloat 3s ease-in-out infinite;
        }

        @keyframes modalPlaceholderFloat {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-10px) scale(1.05); }
        }

        .modal-placeholder-text {
            font-size: 1.5em;
            font-weight: 700;
            color: #c4b498;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            font-family: 'Tajawal', sans-serif;
        }

        .modal-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 20px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, .6);
            cursor: grab;
            user-select: none;
            transition: transform 0.2s ease-out;
            border: 3px solid rgba(196, 180, 152, .55);
        }

        .modal-image:active {
            cursor: grabbing;
        }

        .modal-info {
            background: linear-gradient(135deg, rgba(30, 35, 48, 0.95), rgba(125, 106, 74, .18));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(196, 180, 152, .55);
            border-radius: 20px;
            padding: 28px;
            max-width: 650px;
            width: 100%;
            text-align: center;
            box-shadow: 0 12px 40px rgba(0, 0, 0, .6);
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8em;
            font-weight: 800;
            margin-bottom: 14px;
            background: linear-gradient(135deg, #7d6a4a, #a08d6d, #c4b498, #e8dfc8, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 8px rgba(125, 106, 74, .6));
        }

        .modal-description {
            color: #c4b498;
            margin-bottom: 18px;
            line-height: 1.8;
            font-size: 1.05em;
            text-shadow: 0 1px 3px rgba(0, 0, 0, .3);
        }

        .modal-price {
            font-family: 'Playfair Display', serif;
            font-size: 2em;
            font-weight: 900;
            background: linear-gradient(135deg, #7d6a4a, #a08d6d, #c4b498, #e8dfc8, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 8px rgba(125, 106, 74, .6));
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 35px 25px;
            color: #c4b498;
            font-size: .95em;
            background: linear-gradient(135deg, rgba(30, 35, 48, 0.85), rgba(125, 106, 74, .15));
            margin-top: 25px;
            border-radius: 24px;
            border: 1px solid rgba(196, 180, 152, .4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, .4);
        }

        .footer p {
            margin: 10px 0;
            line-height: 1.8;
            text-shadow: 0 1px 3px rgba(0, 0, 0, .3);
        }

        /* RTL/LTR Support */
        html[dir="ltr"] .language-menu {
            left: auto;
            right: 18px;
        }

        html[dir="ltr"] .language-dropdown {
            left: auto;
            right: 0;
        }

        html[dir="ltr"] .menu-item::before {
            right: auto;
            left: 0;
        }

        html[dir="ltr"] .menu-item:hover {
            padding-right: 22px;
            padding-left: 28px;
        }

        /* Responsive */
        @media (max-width:480px) {
            .header {
                padding: 16px 18px;
            }

            .logo-container {
                width: 75px;
                height: 75px;
            }

            .header-info {
                margin-left: 75px;
            }
            
            html[dir="ltr"] .header-info {
                margin-left: 0;
                margin-right: 75px;
            }

            .restaurant-name {
                font-size: clamp(1.3em, 4.2vw, 1.6em);
                letter-spacing: 3px;
            }

            .subtitle {
                font-size: 0.72em;
                letter-spacing: 2px;
            }

            .section-title {
                padding: 18px 20px;
            }

            .menu-item {
                padding: 20px;
            }

            .item-image-wrapper {
                width: 75px;
                height: 75px;
            }

            .modal-image-container {
                height: 55vh;
            }

            .tab-btn {
                padding: 11px 20px;
                font-size: 0.95em;
            }

            .burger-icon {
                width: 42px;
                height: 42px;
            }

            .burger-icon img {
                width: 20px;
                height: 20px;
            }

            .language-menu {
                top: 14px;
                left: 14px;
            }

            html[dir="ltr"] .language-menu {
                right: 14px;
            }

            .menu-tabs {
                top: 107px;
            }
        }
    </style>
</head>

<body>
    <div class="header" id="mainHeader">
        <div class="language-menu" id="languageMenu">
            <div class="burger-icon" id="burgerIcon">
                <img src="/img/lang/world.ico" alt="Language">
            </div>
            <div class="language-dropdown">
                <div class="lang-option active" data-lang="ar">
                    <span class="lang-icon">🇮🇶</span>
                    <span>العربية</span>
                </div>
                <div class="lang-option" data-lang="en">
                    <span class="lang-icon">🇬🇧</span>
                    <span>English</span>
                </div>
            </div>
        </div>
        
        <div class="logo-container">
            <div class="logo-circle" id="logoCircle">
                <img src="img/logo/logo.png" alt="Burj Al-Furat Restaurant" class="logo-image">
            </div>
        </div>
        
        <div class="header-info">
            <h1 class="restaurant-name">BURJ AL-FURAT</h1>
            <p class="subtitle" data-tr="subtitle">تجربة طعام فاخرة</p>
        </div>
    </div>

    <div class="menu-tabs" id="menuTabs">
        <button class="tab-btn active" data-tab="food">🍽️ الأطعمة</button>
        <button class="tab-btn" data-tab="drinks">☕ المشروبات</button>
        <button class="tab-btn" data-tab="shisha">🍃 الأراكيل</button>
    </div>

    <div class="menu-container" id="menuContainer">
        <!-- محتوى المنيو سيتم إضافته عبر JavaScript -->
    </div>

    <div class="footer">
        <p data-tr="footer1">جميع أطباقنا تُحضّر طازجة عند الطلب</p>
        <p data-tr="footer2">جميع الأسعار بالدينار العراقي</p>
        <p data-tr="footer3">فندق الأنبار الدولي</p>
    </div>

    <div class="modal" id="imageModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">×</button>
            <div class="modal-image-container" id="imageContainer">
                <img src="" alt="" class="modal-image" id="modalImage" style="cursor: grab;">
            </div>
            <div class="modal-info">
                <h2 class="modal-title" id="modalTitle"></h2>
                <p class="modal-description" id="modalDescription"></p>
                <div class="modal-price" id="modalPrice"></div>
            </div>
        </div>
    </div>

    <script>
        let menuData = null;

        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                menuData = data;
                init();
            })
            .catch(error => {
                console.error('Error loading menu data:', error);
                alert('خطأ في تحميل بيانات المنيو');
            });

        let L = 'ar', s = 1, tx = 0, ty = 0, drag = false, sx, sy, td = 0, currentTab = 'food';
        let lastTap = 0;
        let modalScrollPosition = 0;
        
        const e = e => document.getElementById(e), 
              mc = e('menuContainer'), 
              mo = e('imageModal'), 
              mi = e('modalImage'), 
              mt = e('modalTitle'), 
              md = e('modalDescription'), 
              mp = e('modalPrice'),
              mtabs = e('menuTabs'),
              languageMenu = e('languageMenu'),
              burgerIcon = e('burgerIcon');

        burgerIcon.addEventListener('click', (e) => {
            e.stopPropagation();
            languageMenu.classList.toggle('open');
        });

        document.addEventListener('click', (e) => {
            if (!languageMenu.contains(e.target)) {
                languageMenu.classList.remove('open');
            }
        });

        function init() {
            if (menuData.logo && menuData.logo.url && menuData.logo.url.trim() !== '') {
                const logoImage = document.querySelector('.logo-image');
                logoImage.src = menuData.logo.url;
                logoImage.alt = menuData.logo.alt;
            }

            document.querySelectorAll('.lang-option').forEach(option => {
                option.addEventListener('click', () => {
                    L = option.dataset.lang;
                    document.querySelectorAll('.lang-option').forEach(x => x.classList.remove('active'));
                    option.classList.add('active');
                    document.documentElement.setAttribute('lang', L);
                    document.documentElement.setAttribute('dir', L === 'ar' ? 'rtl' : 'ltr');
                    languageMenu.classList.remove('open');
                    renderTabs();
                    r();
                    u();
                });
            });

            renderTabs();
            r();
            window.addEventListener('popstate', handleBackButton);
        }

        function renderTabs() {
            const tabs = menuData.tabs[L];
            mtabs.innerHTML = tabs.map((tab, idx) => 
                `<button class="tab-btn ${idx === 0 ? 'active' : ''}" data-tab="${tab.id}">${tab.name}</button>`
            ).join('');

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentTab = btn.dataset.tab;
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    const targetContent = document.querySelector(`[data-tab-content="${currentTab}"]`);
                    if (targetContent) {
                        targetContent.classList.add('active');
                    }
                });
            });
        }

        function u() { 
            document.querySelectorAll('[data-tr]').forEach(e => { 
                e.textContent = menuData.translations[L][e.dataset.tr] 
            }) 
        }

        function r() {
            const tabs = menuData.tabs[L];
            const fragment = document.createDocumentFragment();
            
            tabs.forEach((tab, tabIdx) => {
                const tabDiv = document.createElement('div');
                tabDiv.className = `tab-content ${tabIdx === 0 ? 'active' : ''}`;
                tabDiv.setAttribute('data-tab-content', tab.id);
                
                const sections = menuData.menu[L].filter(c => c.tab === tab.id);
                
                sections.forEach((c, i) => {
                    const sectionDiv = document.createElement('div');
                    sectionDiv.className = 'section';
                    
                    const titleDiv = document.createElement('div');
                    titleDiv.className = 'section-title';
                    titleDiv.innerHTML = `
                        <div class="section-title-text">
                            <span class="category-icon">${c.icon}</span>${c.title}
                        </div>
                        <span class="toggle-icon">▼</span>
                    `;
                    
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'section-content';
                    
                    c.items.forEach((x, j) => {
                        const itemDiv = document.createElement('div');
                        itemDiv.className = 'menu-item';
                        
                        // تحديد placeholder بناءً على وجود الصورة
                        const imageContent = x.img ? 
                            `<div class="item-image-wrapper">
                                <img src="${x.img}" alt="${x.name}" class="item-image" loading="lazy" decoding="async">
                            </div>` :
                            `<div class="item-image-wrapper">
                                <div class="item-placeholder">
                                    <div class="placeholder-icon">🍽️</div>
                                </div>
                            </div>`;
                        
                        itemDiv.innerHTML = `
                            ${imageContent}
                            <div class="item-content">
                                <div class="item-header">
                                    <div class="item-name">${x.name}</div>
                                    <div class="item-price">${x.price}</div>
                                </div>
                                ${x.desc ? `<div class="item-description">${x.desc}</div>` : ''}
                            </div>
                        `;
                        itemDiv.addEventListener('click', () => o(c.title, i, j, tab.id), { passive: true });
                        contentDiv.appendChild(itemDiv);
                    });
                    
                    titleDiv.addEventListener('click', (event) => t(event, titleDiv, contentDiv), { passive: true });
                    sectionDiv.appendChild(titleDiv);
                    sectionDiv.appendChild(contentDiv);
                    tabDiv.appendChild(sectionDiv);
                });
                
                fragment.appendChild(tabDiv);
            });
            
            mc.innerHTML = '';
            mc.appendChild(fragment);
        }

        function t(event, titleElem, contentElem) { 
            event.stopPropagation();
            
            const isActive = contentElem.classList.contains('active');
            
            if (isActive) {
                contentElem.style.height = '0px';
                contentElem.classList.remove('active');
                titleElem.classList.remove('active');
            } else {
                const height = contentElem.scrollHeight;
                contentElem.style.height = height + 'px';
                contentElem.classList.add('active'); 
                titleElem.classList.add('active');
                
                setTimeout(() => {
                    if (contentElem.classList.contains('active')) {
                        contentElem.style.height = 'auto';
                    }
                }, 300);
            }
        }

        function o(t, i, j, tabId) { 
            event.stopPropagation();
            const items = menuData.menu[L].filter(c => c.tab === tabId);
            const x = items[i].items[j];
            
            modalScrollPosition = window.scrollY;
            history.pushState({ modal: true }, '');
            
            // إذا في صورة، نعرضها
            if (x.img) {
                mi.onload = () => { 
                    mo.classList.add('active'); 
                    document.body.style.overflow = 'hidden';
                    document.body.style.position = 'fixed';
                    document.body.style.top = `-${modalScrollPosition}px`;
                    document.body.style.width = '100%';
                }; 
                mi.src = x.img;
                mi.style.display = 'block';
                document.getElementById('imageContainer').querySelector('.modal-placeholder')?.remove();
            } else {
                // إذا ما في صورة، نعرض placeholder
                mi.style.display = 'none';
                const container = document.getElementById('imageContainer');
                
                // إزالة placeholder القديم إذا موجود
                container.querySelector('.modal-placeholder')?.remove();
                
                // إنشاء placeholder جديد
                const placeholder = document.createElement('div');
                placeholder.className = 'modal-placeholder';
                placeholder.innerHTML = `
                    <div class="modal-placeholder-icon">🍽️</div> `;
                container.appendChild(placeholder);
                
                mo.classList.add('active'); 
                document.body.style.overflow = 'hidden';
                document.body.style.position = 'fixed';
                document.body.style.top = `-${modalScrollPosition}px`;
                document.body.style.width = '100%';
            }
            
            mt.textContent = x.name; 
            md.textContent = x.desc || ''; 
            mp.textContent = x.price; 
            
            z();
        }

        function c() { 
            mo.classList.add('closing');
            setTimeout(() => {
                mo.classList.remove('active', 'closing'); 
                document.body.style.overflow = '';
                document.body.style.position = '';
                document.body.style.top = '';
                document.body.style.width = '';
                window.scrollTo(0, modalScrollPosition);
                z();
            }, 300);
        }

        function handleBackButton(event) {
            if (mo.classList.contains('active')) {
                event.preventDefault();
                c();
            }
        }

        function z() { 
            s = 1; 
            tx = ty = 0; 
            v() 
        }

        function v() { 
            mi.style.transform = `translate(${tx}px,${ty}px) scale(${s})` 
        }

        e('modalClose').addEventListener('click', (event) => {
            event.stopPropagation();
            history.back();
        });

        mi.addEventListener('touchend', (e) => {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            
            if (tapLength < 300 && tapLength > 0) {
                if (s === 1) {
                    s = 2.5;
                } else {
                    s = 1;
                    tx = ty = 0;
                }
                v();
            }
            lastTap = currentTime;
        });

        mi.addEventListener('mousedown', e => { 
            if (s <= 1) return; 
            drag = true; 
            sx = e.clientX - tx; 
            sy = e.clientY - ty; 
            mi.style.cursor = 'grabbing' 
        });

        mi.addEventListener('touchstart', e => { 
            if (e.touches.length === 2) { 
                e.preventDefault(); 
                const t1 = e.touches[0], t2 = e.touches[1]; 
                td = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY) 
            } else if (e.touches.length === 1 && s > 1) { 
                drag = true; 
                sx = e.touches[0].clientX - tx; 
                sy = e.touches[0].clientY - ty 
            } 
        }, { passive: false });

        document.addEventListener('mousemove', e => { 
            if (!drag) return; 
            e.preventDefault(); 
            tx = e.clientX - sx; 
            ty = e.clientY - sy; 
            v() 
        });

        document.addEventListener('touchmove', e => { 
            if (e.touches.length === 2) { 
                e.preventDefault(); 
                const t1 = e.touches[0], t2 = e.touches[1], d = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY); 
                if (td > 0) { 
                    const delta = d - td; 
                    s = Math.max(.5, Math.min(3, s + delta * .01)); 
                    v() 
                } 
                td = d 
            } else if (drag && e.touches.length === 1) { 
                e.preventDefault(); 
                tx = e.touches[0].clientX - sx; 
                ty = e.touches[0].clientY - sy; 
                v() 
            } 
        }, { passive: false });

        document.addEventListener('mouseup', () => { 
            drag = false; 
            mi.style.cursor = 'grab' 
        });

        document.addEventListener('touchend', () => { 
            drag = false; 
            td = 0 
        });

        e('imageContainer').addEventListener('wheel', e => { 
            e.preventDefault(); 
            const delta = e.deltaY > 0 ? -.1 : .1; 
            s = Math.max(.5, Math.min(3, s + delta)); 
            v() 
        }, { passive: false });

        document.addEventListener('keydown', e => { 
            if (!mo.classList.contains('active')) return; 
            if (e.key === 'Escape') {
                history.back();
            }
        });
    </script>
</body>
</html>
