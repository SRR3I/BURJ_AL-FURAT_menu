<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | الصفحة غير موجودة</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Playfair+Display:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary:         #7d6a4a;
            --primary-light:   #a08d6d;
            --primary-lighter: #c4b498;
            --primary-lightest:#e8dfc8;
            --luxury-dark:     #12161f;
            --luxury-darker:   #0a0e1a;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--luxury-darker);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* خلفية راديال */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 15% 25%, rgba(125,106,74,.30) 0%, transparent 45%),
                radial-gradient(circle at 85% 75%, rgba(160,141,109,.25) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(196,180,152,.15) 0%, transparent 55%);
            pointer-events: none;
            animation: bgPulse 6s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 0.8; }
            50%       { opacity: 1;   }
        }

        /* جسيمات ذهبية */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0%   { transform: translateY(110vh) scale(0); opacity: 0;   }
            10%  { opacity: 1; }
            90%  { opacity: 0.55; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0;   }
        }

        /* شريط علوي */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg,
                #7d6a4a, #a08d6d, #c4b498, #e8dfc8, #c4b498, #a08d6d, #7d6a4a);
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0%   { background-position: 0%   0; }
            100% { background-position: 200% 0; }
        }

        /* ===== CONTAINER ===== */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 30px 24px;
            max-width: 520px;
            width: 100%;
        }

        /* ===== 404 ===== */
        .error-number {
            font-family: 'Playfair Display', serif;
            font-size: clamp(6em, 22vw, 10em);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -4px;
            background: linear-gradient(135deg,
                #7d6a4a 0%,
                #a08d6d 25%,
                #c4b498 50%,
                #e8dfc8 75%,
                #fff    100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: goldShine 3s linear infinite, numberGlow 4s ease-in-out infinite;
            margin-bottom: 4px;
        }

        @keyframes goldShine {
            0%   { background-position: 0%   center; }
            100% { background-position: 200% center; }
        }

        @keyframes numberGlow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(125,106,74,.40)); }
            50%       { filter: drop-shadow(0 0 45px rgba(196,180,152,.65)); }
        }

        /* ===== أيقونة ===== */
        .food-icon {
            font-size: 3.5em;
            margin: 8px 0 18px;
            display: block;
            animation: bounce 2.2s ease-in-out infinite;
            filter: drop-shadow(0 4px 12px rgba(125,106,74,.55));
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-14px); }
        }

        /* ===== نصوص ===== */
        .error-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.3em, 5vw, 1.9em);
            font-weight: 700;
            color: #e8dfc8;
            margin-bottom: 12px;
            text-shadow: 0 2px 10px rgba(125,106,74,.4);
        }

        .error-desc {
            font-size: 1em;
            color: #a08d6d;
            line-height: 1.75;
            margin-bottom: 34px;
        }

        /* ===== بطاقة ===== */
        .empty-plate {
            background: linear-gradient(135deg, rgba(30,35,48,.88), rgba(125,106,74,.15));
            border: 1px solid rgba(196,180,152,.40);
            border-radius: 22px;
            padding: 28px 24px;
            margin-bottom: 32px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,.45);
        }

        .empty-plate::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, rgba(125,106,74,.18) 0%, transparent 60%),
                        radial-gradient(circle at 70% 70%, rgba(196,180,152,.14) 0%, transparent 60%);
            pointer-events: none;
            animation: platePulse 4s ease-in-out infinite;
        }

        @keyframes platePulse {
            0%, 100% { opacity: 0.6; }
            50%       { opacity: 1;   }
        }

        .plate-emoji {
            font-size: 2.8em;
            display: block;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 3px 8px rgba(125,106,74,.4));
            animation: plateBounce 3s ease-in-out infinite;
        }

        @keyframes plateBounce {
            0%, 100% { transform: translateY(0) scale(1);    }
            50%       { transform: translateY(-6px) scale(1.06); }
        }

        .plate-text {
            font-size: 0.95em;
            color: #7d6a4a;
            font-style: italic;
            position: relative;
            z-index: 1;
        }

        /* ===== فاصل ===== */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 28px 0 24px;
            opacity: 0.35;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #c4b498, transparent);
        }

        .divider-icon { font-size: 1em; color: #c4b498; }

        /* ===== أزرار ===== */
        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 13px 28px;
            border-radius: 16px;
            font-family: 'Tajawal', sans-serif;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all .3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, rgba(125,106,74,.65), rgba(160,141,109,.50));
            color: #e8dfc8;
            border: 1px solid rgba(196,180,152,.70);
            box-shadow: 0 6px 22px rgba(125,106,74,.40);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            background: linear-gradient(135deg, rgba(125,106,74,.80), rgba(160,141,109,.65));
            box-shadow: 0 10px 32px rgba(125,106,74,.60);
            border-color: rgba(232,223,200,.85);
        }

        .btn-secondary {
            background: rgba(255,255,255,.05);
            color: #a08d6d;
            border: 1px solid rgba(196,180,152,.25);
        }

        .btn-secondary:hover {
            background: rgba(125,106,74,.18);
            color: #e8dfc8;
            border-color: rgba(196,180,152,.50);
            transform: translateY(-3px);
        }

        /* responsive */
        @media (max-width: 480px) {
            .error-number { letter-spacing: -2px; }
            .btn { padding: 11px 20px; font-size: 0.95em; }
        }
    </style>
</head>
<body>

    <div class="top-bar"></div>
    <div class="particles" id="particles"></div>

    <div class="container">

        <div class="error-number">404</div>

        <span class="food-icon">🍽️</span>

        <h1 class="error-title">الصفحة غير موجودة</h1>
        <p class="error-desc">
            يبدو أن هذا الطبق غير موجود في قائمتنا!<br>
            ربما تم نقل الصفحة أو حذفها.
        </p>

        <div class="empty-plate">
            <span class="plate-emoji">🫙</span>
            <p class="plate-text">الطبق الذي تبحث عنه... فرغ!</p>
        </div>

        <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-icon">✦</span>
            <div class="divider-line"></div>
        </div>

        <div class="buttons">
            <a href="index.html" class="btn btn-primary">
                🏠 العودة للرئيسية
            </a>
            <a href="javascript:history.back()" class="btn btn-secondary">
                ← الصفحة السابقة
            </a>
        </div>

    </div>

    <script>
        const container = document.getElementById('particles');
        const colors = [
            'rgba(196,180,152,',
            'rgba(125,106,74,',
            'rgba(160,141,109,',
            'rgba(232,223,200,',
        ];

        for (let i = 0; i < 28; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size     = Math.random() * 5 + 1.5;
            const color    = colors[Math.floor(Math.random() * colors.length)];
            const duration = Math.random() * 14 + 8;
            const delay    = Math.random() * 12;
            const left     = Math.random() * 100;

            p.style.cssText = `
                width: ${size}px;
                height: ${size}px;
                background: ${color}0.65);
                left: ${left}%;
                bottom: -20px;
                animation-duration: ${duration}s;
                animation-delay: ${delay}s;
                box-shadow: 0 0 ${size * 2.5}px ${color}0.35);
            `;
            container.appendChild(p);
        }
    </script>
</body>
</html>
